<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Umbando · Pedidos</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #002a66;
    --gold: #f8b500;
    --gold-light: #ffd76b;
    --cream: #fffdf7;
    --white: #ffffff;
    --gray-1: #f4f3ef;
    --gray-2: #e8e6df;
    --gray-3: #b0aca0;
    --gray-4: #6e6a60;
    --text: #1a1814;
    --radius: 12px;
    --shadow: 0 2px 16px rgba(0,42,102,0.08);
    --shadow-lg: 0 8px 40px rgba(0,42,102,0.14);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--navy);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,42,102,0.3);
  }
  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.5px;
  }
  .logo span { color: var(--white); font-weight: 400; }
  .header-stats {
    display: flex;
    gap: 20px;
  }
  .stat {
    text-align: center;
  }
  .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
  }
  .stat-label {
    font-size: 10px;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    background: var(--white);
    border-bottom: 1px solid var(--gray-2);
    padding: 0 24px;
    gap: 0;
  }
  .tab {
    padding: 14px 20px;
    font-size: 13px;
    font-weight: 500;
    color: var(--gray-4);
    border: none;
    background: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }
  .tab.active {
    color: var(--navy);
    border-bottom-color: var(--gold);
    font-weight: 600;
  }
  .tab:hover:not(.active) { color: var(--navy); }

  /* ── MAIN ── */
  main { padding: 24px; max-width: 960px; margin: 0 auto; }

  /* ── PANEL ── */
  .panel { display: none; }
  .panel.active { display: block; }

  /* ── FORM ── */
  .form-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 28px;
    box-shadow: var(--shadow);
    margin-bottom: 24px;
  }
  .form-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 22px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--gray-2);
  }
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    header { flex-wrap: wrap; gap: 12px; }
    .header-stats { gap: 12px; }
  }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field.full { grid-column: 1 / -1; }
  label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--gray-4);
  }
  input, textarea, select {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    border: 1.5px solid var(--gray-2);
    border-radius: 8px;
    background: var(--cream);
    color: var(--text);
    transition: border-color 0.2s;
    outline: none;
  }
  input:focus, textarea:focus, select:focus {
    border-color: var(--navy);
    background: var(--white);
  }
  textarea { resize: vertical; min-height: 80px; }

  /* ── FOTO UPLOAD ── */
  .foto-area {
    border: 2px dashed var(--gray-2);
    border-radius: 10px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--cream);
    position: relative;
  }
  .foto-area:hover, .foto-area.drag { border-color: var(--gold); background: #fffbee; }
  .foto-area input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; border: none; padding: 0; background: none;
  }
  .foto-icon { font-size: 28px; margin-bottom: 8px; }
  .foto-text { font-size: 13px; color: var(--gray-4); }
  .foto-text strong { color: var(--navy); }
  .foto-preview {
    display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px;
  }
  .foto-thumb {
    width: 60px; height: 60px; border-radius: 8px;
    object-fit: cover; border: 2px solid var(--gray-2);
  }

  /* ── BTN ── */
  .btn-primary {
    background: var(--navy);
    color: var(--white);
    border: none;
    padding: 13px 28px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }
  .btn-primary:hover { background: #003d99; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,42,102,0.25); }
  .btn-primary:active { transform: translateY(0); }
  .btn-gold {
    background: var(--gold);
    color: var(--navy);
  }
  .btn-gold:hover { background: var(--gold-light); }

  .form-actions {
    margin-top: 22px;
    display: flex;
    gap: 12px;
    justify-content: flex-end;
  }
  .btn-outline {
    background: none;
    color: var(--gray-4);
    border: 1.5px solid var(--gray-2);
    padding: 13px 20px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-outline:hover { border-color: var(--navy); color: var(--navy); }

  /* ── FILTERS ── */
  .filters {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-btn {
    padding: 7px 16px;
    border-radius: 20px;
    border: 1.5px solid var(--gray-2);
    background: var(--white);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--gray-4);
  }
  .filter-btn.active {
    background: var(--navy);
    border-color: var(--navy);
    color: var(--white);
  }
  .filter-btn:hover:not(.active) { border-color: var(--navy); color: var(--navy); }
  .search-input {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--gray-2);
    font-size: 13px;
    background: var(--white);
    outline: none;
    min-width: 200px;
    flex: 1;
  }
  .search-input:focus { border-color: var(--navy); }

  /* ── PEDIDO CARD ── */
  .pedidos-list { display: flex; flex-direction: column; gap: 14px; }
  .pedido-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
    border-left: 4px solid var(--gray-2);
    transition: all 0.2s;
  }
  .pedido-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); }
  .pedido-card.status-producao { border-left-color: #f59e0b; }
  .pedido-card.status-pronto { border-left-color: #10b981; }
  .pedido-card.status-enviado { border-left-color: var(--navy); }
  .pedido-card.status-entregue { border-left-color: var(--gray-3); }

  .pedido-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 12px;
  }
  .pedido-id {
    font-size: 11px;
    color: var(--gray-3);
    font-weight: 500;
    margin-bottom: 3px;
    letter-spacing: 0.5px;
  }
  .pedido-nome {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--navy);
  }
  .pedido-wpp {
    font-size: 13px;
    color: var(--gray-4);
    margin-top: 2px;
  }
  .pedido-wpp a {
    color: #128C7E;
    text-decoration: none;
    font-weight: 500;
  }
  .pedido-wpp a:hover { text-decoration: underline; }

  .badge {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    white-space: nowrap;
  }
  .badge-producao { background: #fef3c7; color: #92400e; }
  .badge-pronto { background: #d1fae5; color: #065f46; }
  .badge-enviado { background: #dbeafe; color: #1e40af; }
  .badge-entregue { background: var(--gray-1); color: var(--gray-4); }

  .urgente-badge {
    display: inline-block;
    background: #dc2626;
    color: white;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 2px 8px;
    border-radius: 4px;
    margin-left: 8px;
    vertical-align: middle;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  .pedido-card.urgente { border-left-color: #dc2626 !important; }

  .pedido-desc {
    font-size: 13px;
    color: var(--gray-4);
    line-height: 1.5;
    margin-bottom: 12px;
    padding: 10px 12px;
    background: var(--gray-1);
    border-radius: 8px;
  }

  .pedido-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 12px;
  }
  .meta-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .meta-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--gray-3);
    font-weight: 600;
  }
  .meta-value {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }
  .meta-value.valor {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--navy);
  }

  .pedido-fotos {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .pedido-foto {
    width: 56px; height: 56px; border-radius: 8px;
    object-fit: cover; border: 2px solid var(--gray-2);
    cursor: pointer;
    transition: transform 0.2s;
  }
  .pedido-foto:hover { transform: scale(1.05); border-color: var(--gold); }

  .pedido-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding-top: 12px;
    border-top: 1px solid var(--gray-1);
  }
  .btn-sm {
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1.5px solid var(--gray-2);
    background: var(--white);
    color: var(--gray-4);
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-sm:hover { border-color: var(--navy); color: var(--navy); }
  .btn-sm.danger:hover { border-color: #dc2626; color: #dc2626; }
  .btn-sm.status-next {
    background: var(--navy);
    border-color: var(--navy);
    color: var(--white);
  }
  .btn-sm.status-next:hover { background: #003d99; }

  /* ── EMPTY ── */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--gray-3);
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
  .empty-text { font-size: 15px; }

  /* ── MODAL FOTO ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-overlay img {
    max-width: 90vw; max-height: 90vh;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .modal-close {
    position: absolute; top: 20px; right: 20px;
    color: white; font-size: 28px; cursor: pointer;
    width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
    border-radius: 50%; background: rgba(255,255,255,0.15);
    transition: background 0.2s;
  }
  .modal-close:hover { background: rgba(255,255,255,0.3); }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--navy); color: var(--white);
    padding: 14px 20px; border-radius: 10px;
    font-size: 13px; font-weight: 500;
    box-shadow: var(--shadow-lg);
    transform: translateY(80px); opacity: 0;
    transition: all 0.3s;
    z-index: 500;
    border-left: 4px solid var(--gold);
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* ── STATUS SELECT ── */
  .status-select-wrap { position: relative; display: inline-block; }

  /* ── COUNTER BADGE ── */
  .tab-count {
    background: var(--gold);
    color: var(--navy);
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 10px;
    font-weight: 700;
    margin-left: 6px;
  }

  /* obs field */
  .pedido-obs {
    font-size: 12px;
    color: var(--gray-4);
    font-style: italic;
    margin-top: 6px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">Umbando <span>· Pedidos</span></div>
  <div class="header-stats">
    <div class="stat">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-producao">0</div>
      <div class="stat-label">Produção</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-pronto">0</div>
      <div class="stat-label">Prontos</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-enviado">0</div>
      <div class="stat-label">Enviados</div>
    </div>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('lista')">📋 Pedidos</button>
  <button class="tab" onclick="switchTab('novo')">＋ Novo Pedido</button>
</div>

<main>

  <!-- LISTA -->
  <div class="panel active" id="panel-lista">
    <div class="filters">
      <input class="search-input" id="search" placeholder="Buscar por nome, produto, código..." oninput="renderList()">
      <button class="filter-btn active" onclick="setFilter('todos', this)">Todos</button>
      <button class="filter-btn" onclick="setFilter('producao', this)">Em Produção</button>
      <button class="filter-btn" onclick="setFilter('pronto', this)">Prontos</button>
      <button class="filter-btn" onclick="setFilter('enviado', this)">Enviados</button>
      <button class="filter-btn" onclick="setFilter('entregue', this)">Entregues</button>
    </div>
    <div class="pedidos-list" id="pedidos-list"></div>
  </div>

  <!-- NOVO PEDIDO -->
  <div class="panel" id="panel-novo">
    <div class="form-card">
      <div class="form-title">✦ Novo Pedido</div>
      <div class="form-grid">

        <div class="field">
          <label>Nome do Cliente</label>
          <input type="text" id="f-nome" placeholder="Ex: Maria das Graças">
        </div>

        <div class="field">
          <label>WhatsApp</label>
          <input type="tel" id="f-wpp" placeholder="(11) 99999-9999">
        </div>

        <div class="field full">
          <label>Descrição da Peça / Produto</label>
          <textarea id="f-desc" placeholder="Ex: Guia de Oxum com fio amarelo e dourado, 7 voltas, conta de cristal..."></textarea>
        </div>

        <div class="field">
          <label>Valor Total (R$)</label>
          <input type="number" id="f-valor" placeholder="0,00" step="0.01" min="0">
        </div>

        <div class="field">
          <label>Pagamento</label>
          <select id="f-pagto">
            <option value="">Selecionar...</option>
            <option>Pix</option>
            <option>Crédito 2x</option>
            <option>Crédito 3x</option>
            <option>Crédito 4x</option>
            <option>Crédito 6x</option>
            <option>Crédito 10x</option>
            <option>Crédito 12x</option>
            <option>Pendente</option>
          </select>
        </div>

        <div class="field">
          <label>Prazo de Entrega</label>
          <input type="date" id="f-prazo">
        </div>

        <div class="field">
          <label>Código de Rastreio (Correios)</label>
          <input type="text" id="f-rastreio" placeholder="Ex: AA123456789BR">
        </div>

        <div class="field full">
          <label>Observações</label>
          <input type="text" id="f-obs" placeholder="Ex: cliente pediu cor diferente, confirmou endereço...">
        </div>
        <div class="field full" style="flex-direction:row;align-items:center;gap:10px;">
          <input type="checkbox" id="f-urgente" style="width:18px;height:18px;accent-color:#dc2626;cursor:pointer;">
          <label for="f-urgente" style="text-transform:none;font-size:13px;font-weight:600;color:#dc2626;cursor:pointer;letter-spacing:0;">🚨 Pedido Urgente</label>
        </div>

        <div class="field full">
          <label>Fotos de Referência</label>
          <div class="foto-area" id="foto-area">
            <input type="file" accept="image/*" multiple id="f-fotos" onchange="handleFotos(this)">
            <div class="foto-icon">📸</div>
            <div class="foto-text"><strong>Clique ou arraste</strong> as fotos de referência aqui</div>
            <div class="foto-preview" id="foto-preview"></div>
          </div>
        </div>

      </div>

      <div class="form-actions">
        <button class="btn-outline" onclick="limparForm()">Limpar</button>
        <button class="btn-primary btn-gold" onclick="salvarPedido()">✓ Salvar Pedido</button>
      </div>
    </div>
  </div>

</main>

<!-- MODAL FOTO -->
<div class="modal-overlay" id="modal-foto" onclick="fecharModal()">
  <span class="modal-close">✕</span>
  <img id="modal-img" src="" alt="">
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── STATE ──
let pedidos = JSON.parse(localStorage.getItem('umbando_pedidos') || '[]');
let fotosPendentes = []; // base64 das fotos do form atual
let filtroAtivo = 'todos';
let editandoId = null;

function save() {
  localStorage.setItem('umbando_pedidos', JSON.stringify(pedidos));
  updateStats();
}

// ── TABS ──
function switchTab(tab) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  event.target.classList.add('active');
  if (tab === 'lista') renderList();
  if (tab === 'novo' && !editandoId) limparForm();
}

// ── FOTOS ──
function handleFotos(input) {
  const files = Array.from(input.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      fotosPendentes.push(e.target.result);
      renderFotoPreview();
    };
    reader.readAsDataURL(file);
  });
}

function renderFotoPreview() {
  const preview = document.getElementById('foto-preview');
  preview.innerHTML = fotosPendentes.map((f, i) =>
    `<img class="foto-thumb" src="${f}" onclick="abrirModal('${f}')">`
  ).join('');
}

// ── SALVAR ──
function salvarPedido() {
  const nome = document.getElementById('f-nome').value.trim();
  const wpp = document.getElementById('f-wpp').value.trim();
  const desc = document.getElementById('f-desc').value.trim();

  if (!nome) { toast('⚠ Informe o nome do cliente'); return; }
  if (!desc) { toast('⚠ Descreva a peça ou produto'); return; }

  const pedido = {
    id: editandoId || ('P' + Date.now()),
    criadoEm: editandoId ? (pedidos.find(p=>p.id===editandoId)?.criadoEm || new Date().toISOString()) : new Date().toISOString(),
    nome,
    wpp,
    desc,
    valor: document.getElementById('f-valor').value,
    pagto: document.getElementById('f-pagto').value,
    prazo: document.getElementById('f-prazo').value,
    rastreio: document.getElementById('f-rastreio').value.trim().toUpperCase(),
    obs: document.getElementById('f-obs').value.trim(),
    urgente: document.getElementById('f-urgente').checked,
    fotos: fotosPendentes,
    status: editandoId ? (pedidos.find(p=>p.id===editandoId)?.status || 'producao') : 'producao'
  };

  if (editandoId) {
    const idx = pedidos.findIndex(p => p.id === editandoId);
    pedidos[idx] = pedido;
    editandoId = null;
    toast('✓ Pedido atualizado!');
  } else {
    pedidos.unshift(pedido);
    toast('✓ Pedido salvo com sucesso!');
  }

  save();
  limparForm();
  switchTabDirect('lista');
  renderList();
}

function switchTabDirect(tab) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  document.querySelector(`.tab:first-child`).classList.add('active');
}

// ── LIMPAR ──
function limparForm() {
  ['f-nome','f-wpp','f-desc','f-valor','f-prazo','f-rastreio','f-obs'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('f-pagto').value = '';
  document.getElementById('f-urgente').checked = false;
  fotosPendentes = [];
  editandoId = null;
  document.getElementById('foto-preview').innerHTML = '';
  document.querySelector('.form-title').textContent = '✦ Novo Pedido';
}

// ── EDITAR ──
function editarPedido(id) {
  const p = pedidos.find(p => p.id === id);
  if (!p) return;
  editandoId = id;
  fotosPendentes = [...(p.fotos || [])];

  document.getElementById('f-nome').value = p.nome || '';
  document.getElementById('f-wpp').value = p.wpp || '';
  document.getElementById('f-desc').value = p.desc || '';
  document.getElementById('f-valor').value = p.valor || '';
  document.getElementById('f-pagto').value = p.pagto || '';
  document.getElementById('f-prazo').value = p.prazo || '';
  document.getElementById('f-rastreio').value = p.rastreio || '';
  document.getElementById('f-obs').value = p.obs || '';
  document.getElementById('f-urgente').checked = p.urgente || false;
  renderFotoPreview();

  document.querySelector('.form-title').textContent = '✏ Editar Pedido';

  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-novo').classList.add('active');
  document.querySelectorAll('.tab')[1].classList.add('active');

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── STATUS ──
const statusLabel = {
  producao: 'Em Produção',
  pronto: 'Pronto',
  enviado: 'Enviado',
  entregue: 'Entregue'
};
const statusNext = {
  producao: { key: 'pronto', label: '→ Marcar Pronto' },
  pronto: { key: 'enviado', label: '→ Marcar Enviado' },
  enviado: { key: 'entregue', label: '→ Marcar Entregue' },
  entregue: null
};

function avancarStatus(id) {
  const p = pedidos.find(p => p.id === id);
  if (!p || !statusNext[p.status]) return;
  p.status = statusNext[p.status].key;
  save();
  renderList();
  toast('✓ Status atualizado: ' + statusLabel[p.status]);
}

function deletarPedido(id) {
  if (!confirm('Remover este pedido?')) return;
  pedidos = pedidos.filter(p => p.id !== id);
  save();
  renderList();
  toast('Pedido removido');
}

// ── FILTRO ──
function setFilter(filtro, btn) {
  filtroAtivo = filtro;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

// ── RENDER LIST ──
function renderList() {
  const q = document.getElementById('search').value.toLowerCase();
  let lista = pedidos;

  if (filtroAtivo !== 'todos') {
    lista = lista.filter(p => p.status === filtroAtivo);
  }
  if (q) {
    lista = lista.filter(p =>
      p.nome.toLowerCase().includes(q) ||
      p.desc.toLowerCase().includes(q) ||
      (p.rastreio || '').toLowerCase().includes(q) ||
      (p.obs || '').toLowerCase().includes(q)
    );
  }

  const container = document.getElementById('pedidos-list');

  if (lista.length === 0) {
    container.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📦</div>
        <div class="empty-text">Nenhum pedido encontrado</div>
      </div>`;
    return;
  }

  container.innerHTML = lista.map(p => {
    const data = p.criadoEm ? new Date(p.criadoEm).toLocaleDateString('pt-BR') : '';
    const prazo = p.prazo ? new Date(p.prazo + 'T12:00:00').toLocaleDateString('pt-BR') : '';
    const wppLink = p.wpp ? `<a href="https://wa.me/55${p.wpp.replace(/\D/g,'')}" target="_blank">${p.wpp}</a>` : '—';
    const next = statusNext[p.status];
    const fotos = (p.fotos || []).map(f =>
      `<img class="pedido-foto" src="${f}" onclick="abrirModal('${f}')">`
    ).join('');

    return `
    <div class="pedido-card status-${p.status}${p.urgente ? ' urgente' : ''}">
      <div class="pedido-top">
        <div>
          <div class="pedido-id">${p.id} · ${data}</div>
          <div class="pedido-nome">${p.nome}${p.urgente ? '<span class="urgente-badge">🚨 Urgente</span>' : ''}</div>
          <div class="pedido-wpp">${wppLink}</div>
        </div>
        <span class="badge badge-${p.status}">${statusLabel[p.status]}</span>
      </div>

      <div class="pedido-desc">${p.desc}</div>

      <div class="pedido-meta">
        ${p.valor ? `<div class="meta-item"><div class="meta-label">Valor</div><div class="meta-value valor">R$ ${Number(p.valor).toFixed(2).replace('.',',')}</div></div>` : ''}
        ${p.pagto ? `<div class="meta-item"><div class="meta-label">Pagamento</div><div class="meta-value">${p.pagto}</div></div>` : ''}
        ${prazo ? `<div class="meta-item"><div class="meta-label">Prazo</div><div class="meta-value">${prazo}</div></div>` : ''}
        ${p.rastreio ? `<div class="meta-item"><div class="meta-label">Rastreio</div><div class="meta-value">${p.rastreio}</div></div>` : ''}
      </div>

      ${fotos ? `<div class="pedido-fotos">${fotos}</div>` : ''}
      ${p.obs ? `<div class="pedido-obs">📝 ${p.obs}</div>` : ''}

      <div class="pedido-actions">
        ${next ? `<button class="btn-sm status-next" onclick="avancarStatus('${p.id}')">${next.label}</button>` : ''}
        <button class="btn-sm" onclick="editarPedido('${p.id}')">✏ Editar</button>
        <button class="btn-sm danger" onclick="deletarPedido('${p.id}')">🗑 Remover</button>
      </div>
    </div>`;
  }).join('');
}

// ── STATS ──
function updateStats() {
  document.getElementById('stat-total').textContent = pedidos.length;
  document.getElementById('stat-producao').textContent = pedidos.filter(p=>p.status==='producao').length;
  document.getElementById('stat-pronto').textContent = pedidos.filter(p=>p.status==='pronto').length;
  document.getElementById('stat-enviado').textContent = pedidos.filter(p=>p.status==='enviado').length;
}

// ── MODAL ──
function abrirModal(src) {
  document.getElementById('modal-img').src = src;
  document.getElementById('modal-foto').classList.add('open');
}
function fecharModal() {
  document.getElementById('modal-foto').classList.remove('open');
}

// ── TOAST ──
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
